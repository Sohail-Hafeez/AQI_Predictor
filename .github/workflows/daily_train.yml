name: Daily Model Training

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip safely
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (SAFE MODE)
        run: |
          pip install --no-cache-dir --no-input -r requirements.txt

      # 🔥 Safety check (kills fake dependencies instantly)
      - name: Validate requirements safety
        run: |
          echo "Scanning requirements..."
          if grep -E "C:/|scratch|dummy_twofish|-e " requirements.txt; then
            echo "❌ Unsafe dependency detected!"
            exit 1
          fi

      - name: Run training
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB: aqi_db
          MONGO_COLLECTION: raw_aqi_data
        run: python Training.py

      - name: Commit model (if changed)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add best_model.pkl || true
          git commit -m "Auto update model" || echo "No changes"
          git push || echo "Nothing to push"