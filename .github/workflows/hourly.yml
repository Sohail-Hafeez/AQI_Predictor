name: Hourly Data Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip (safe mode)
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # 🔥 IMPORTANT: isolate install + block local paths
      - name: Install dependencies (SAFE MODE)
        run: |
          pip install --no-cache-dir --no-input -r requirements.txt

      # 🔥 DEBUG GUARD (prevents hidden junk installs)
      - name: Validate no local paths in pip
        run: |
          echo "Checking requirements safety..."
          ! grep -E "C:/|scratch|dummy_twofish|-e " requirements.txt || exit 1

      - name: Run hourly pipeline
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB: aqi_db
          MONGO_COLLECTION: raw_aqi_data
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
        run: python hourlyDataPipeline.py